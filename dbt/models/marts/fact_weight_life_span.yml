version: 2

models:
  - name: fact_weight_life_span
    description: "Life span and weight facts per breed, used for dashboard analytics"
    columns:
      - name: breed_id
        tests:
          - unique
          - not_null
      - name: life_span_avg_years
        tests:
          - not_null
      - name: weight_max_lbs
        tests:
          - not_null
