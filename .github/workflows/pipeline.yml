name: Pipeline

on:
  schedule:
    - cron: "0 2 * * *"   # daily at 02:00 UTC
  push:
    branches: [main]
  workflow_dispatch:       # manual trigger

jobs:
  ingest-and-transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up GCP credentials
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Install ingestion dependencies
        run: pip install "dlt[bigquery]" google-cloud-storage

      - name: Run dlt pipeline
        working-directory: ingestion
        env:
          DOG_API_KEY: ${{ secrets.DOG_API_KEY }}
        run: python pipeline.py

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt deps
        working-directory: dbt
        run: dbt deps --profiles-dir .

      - name: dbt run (prod)
        working-directory: dbt
        run: dbt run --target prod --profiles-dir .

      - name: dbt test (prod)
        working-directory: dbt
        run: dbt test --target prod --profiles-dir .
